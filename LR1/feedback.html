        <script src="" async defer></script>
        <header>
            <img src="images/darth-vader.jpg" alt="header-bg">
            <h1>My Sinister Blog</h1>
        </header>
        <nav>
            <a class="a-nav" href="index.html">Home</a>
            <a class="a-nav" href="signin.html">Sign in</a>
            <a class="a-nav" href="signup.html">Sign up</a>
            <a class="a-nav" href="feedback.html">Feedback</a>
        </nav>
        <div class="feedback">
            <h1>Feedback</h1>
            <form action="">
                <div class="topField0">
                    <div class="fieldName">

                        <div class="label0">
                            <label for="firstName">First Name</label>
                        </div>

                        <div class="label0">
                            <label for="lastName">Last Name</label>
                        </div>

                        <div class="label0">
                            <label for="age">Age</label>
                        </div>
                        
                        <div class="label0">    
                            <label for="gender">Gender</label>
                        </div>
                        
                    </div>

                    <div class="field">
                        <input class="shortText" type="text" name="firstName" id="">
                        <input class="shortText" type="text" name="lastName" id="">
                        <input class="shortText" type="number" id="">
                        <select name="gender" id="">
                            <option value="0">Male</option>
                            <option value="1">Female</option>
                            <option value="2">Other</option>
                        </select>
                    </div>
                </div>
                
                <fieldset>
                    <legend>Rate this blog</legend>
                    <input type="radio" name="rate" value="0" id="0">
                    <label for="rate">A2D2 droid</label>
                    <input type="radio" name="rate" value="1" id="1">
                    <label for="rate">Storm trooper</label>
                    <input type="radio" name="rate" value="2" id="2"s>
                    <label for="rate">Purge trooper</label>
                    <input type="radio" name="rate" value="3" id="3" checked>
                    <label for="rate">Inquisitor</label>
                </fieldset>
                <div class="topField0">
                    <div class="feedbackText">
                        <label for="feedback">Feedback</label>
                    </div>
                    <div class="feedbackField">
                        <textarea class="feedbackField" name="feedback" id="">Write your report</textarea>
                    </div>
                </div>
                
                <div class="emailBack">
                    <label for="emailBack?">Email me back with answer</label>
                    <input type="checkbox" name="emailBack?" id="">
                </div>
                
                <br>
                <div class="topField0">
                    <div class="sendDiv">
                        <button class="send">Send</button>
                    </div>
                </div>
                
            </form>
        </div>
