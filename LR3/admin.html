<html>
    <head>
        <title>Blog admin panel</title>
        <link rel="stylesheet" href="css/admin.css">
    </head>

    <body>
        <header>
            <div id="logo">
                Blog Admin Portal
            </div>
            <div id="profile">
                <img src="images/admin.webp" alt="admin avatar">
                <div class="dropdown">
                    <a href="">My profile</a>
                    <a href="" class="logout">Logout</a>
                </div>
            </div>
        </header>
        <div id="main-container">
            <nav id="left-menu">
                <a href="">Posts</a>
                <a href="">Feedbacks</a>
                <a href="">Categories</a>
            </nav>

            <section id="content">
                <h4>Dashboard</h4>
                <p>Welcome to Admin Portal</p>
                <div class="horizontal-bar-chart">
                    <h5>User visits per month</h5>

                    <div class="chart-row">
                        <div class="value">1500</div>
                        <div class="bar">
                            <span style="width: 50%">January</span>
                        </div>
                    </div>

                    <div class="chart-row">
                        <div class="value">3000</div>
                        <div class="bar">
                            <span style="width: 90%">Fabruary</span>
                        </div>
                    </div>

                    <div class="chart-row">
                        <div class="value">1000</div>
                        <div class="bar">
                            <span style="width: 30%">March</span>
                        </div>
                    </div>

                </div>

                <div class="vertical-bar-chart">
                    <h5>User visits per month</h5>

                    <div class="chart-column" style="margin-left: 30px;">
                        <div class="value">1500</div>
                        <div class="bar">
                            <span style="height: 250px">January</span>
                        </div>
                    </div>

                    <div class="chart-column">
                        <div class="value">3000</div>
                        <div class="bar">
                            <span style="height: 450px">Fabruary</span>
                        </div>
                    </div>

                    <div class="chart-column">
                        <div class="value">1000</div>
                        <div class="bar">
                            <span style="height: 150px">March</span>
                        </div>
                    </div>

                </div>
            </section>
        </div>
    </body>
</html>
