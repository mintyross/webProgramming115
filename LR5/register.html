<html>
    <head>
        <title>Blog admin panel</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="css/bootstrap.min.css">
    </head>

    <body>
        <div class="container justify-content-center">
            <div class="card">
                <div class="card-header">Register</div>
                <div class="card-body">
                    <form action="" method="POST" id="register-form">

                        <div class="form-group row">
                            <label for="email-address" class="col-md-4 col-form-label text-md-right">E-Mail Address</label>
                            <div class="col-md-6">
                                <input type="email" id="email-address" class="form-control" name="email-address" autofocus required>
                                <div class="invalid-feedback">
                                    Please enter email.
                                </div>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label for="password" class="col-md-4 col-form-label text-md-right">Password</label>
                            <div class="col-md-6">
                                <input type="password" id="password" class="form-control" name="password" required>
                                <div class="invalid-feedback">
                                    Please enter password.
                                </div>
                            </div>
                        </div>

                        <div class="form-group row">
                            <label for="repeat-password" class="col-md-4 col-form-label text-md-right">Repeat Password</label>
                            <div class="col-md-6">
                                <input type="password" id="repeat-password" class="form-control" name="password" required>
                                <div class="invalid-feedback">
                                    The passwords do not match.
                                </div>
                            </div>
                        </div>

                        <div class="form-group row">
                            <div class="col-md-6 offset-md-4">
                                <button type="submit" class="btn btn-primary" id="register-button">
                                    Register
                                </button>
                                 <a href="login.html" class="btn">Go to login</a>
                            </div>
                        </div>

                    </form>


                </div>
            </div>
        </div>

    
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script> 
    <script src="js/bootstrap.min.js"></script>
    <script src="js/register.js"></script>
    

    </body>
</html>
